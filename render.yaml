services:
  - type: web
    name: vytal-api
    env: node
    region: oregon
    plan: free
    rootDir: api-server
    buildCommand: ""
    startCommand: node dist/index.mjs
    envVars:
      - key: PORT
        value: 10000
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: USDA_API_KEY
        value: DEMO_KEY
